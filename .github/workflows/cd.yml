name: CD Pipeline

on:
  push:
    branches: ["main"]

 

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/spring-auth:latest

      - name: Delete Old Docker Container
        run: docker rm -f spring-auth-container

      - name: Run Docker Container
        run: docker run -d -p 8001:8001 --name spring-auth-container ${{ secrets.DOCKER_USERNAME }}/spring-auth:latest